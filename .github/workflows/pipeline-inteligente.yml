name: Pipeline Inteligente de Relatórios

on:
  workflow_dispatch:


  schedule:
    - cron: "0 2 * * *"


  push:
    branches:
      - "feature/**"
    paths:
      - "src/**"
      - "!src/docs/**"

jobs:

  job_gerador:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Simular construção do projeto
        run: |
          mkdir saida_build/
          echo "Relatório de Auditoria 01 - Gerado em $(date)" > saida_build/relatorio1.txt
          echo "Relatório de Auditoria 02 - Processamento concluído." > saida_build/relatorio2.txt

      - name: Upload de artefatos
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/


  job_auditoria:
    runs-on: ubuntu-latest
    needs: job_gerador
    steps:
      - name: Download de artefatos
        uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais

      - name: Verificação dos arquivos
        run: |
          ls -R
          echo "--- Conteúdo do Relatório 1 ---"
          cat relatorio1.txt
